<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CogniVault Analysis - View AI-reconstructed cognitive traces and reasoning steps.">
    <title>CogniVault - Analysis</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/analysis.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle sidebar"><i class="fas fa-bars"></i></button>
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

        <aside class="sidebar" id="sidebar">
            <a href="dashboard.html" class="sidebar-logo">
                <div class="sidebar-logo-icon"><i class="fas fa-brain"></i></div>
                <div class="sidebar-logo-text">Cogni<span>Vault</span></div>
            </a>
            <nav class="sidebar-nav">
                <div class="nav-section-label">Main</div>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span class="nav-item-text">Dashboard</span></a>
                <a href="uploads.html" class="nav-item"><i class="fas fa-cloud-upload-alt"></i><span class="nav-item-text">Uploads</span></a>
                <a href="analysis.html" class="nav-item active"><i class="fas fa-brain"></i><span class="nav-item-text">Analysis</span></a>
                <a href="history.html" class="nav-item"><i class="fas fa-history"></i><span class="nav-item-text">History</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar" id="user-avatar">?</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name" id="user-name">Loading...</div>
                        <div class="sidebar-user-email" id="user-email"></div>
                    </div>
                </div>
                <a href="#" class="nav-item nav-item-logout" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span class="nav-item-text">Log Out</span></a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-row">
                    <div>
                        <h1 class="page-title">Cognitive Trace Analysis</h1>
                        <p class="page-subtitle">AI-reconstructed reasoning from activity logs</p>
                    </div>
                    <div class="analysis-meta-stats" id="analysis-meta-stats">
                        <!-- Missing Density Ring will be injected here if available -->
                    </div>
                    <div class="page-actions">
                        <div class="toggle-container">
                            <span class="toggle-label">Fragmented View</span>
                            <label class="switch">
                                <input type="checkbox" id="restoration-toggle">
                                <span class="slider round"></span>
                            </label>
                            <span class="toggle-label">AI-Restored View</span>
                        </div>
                        <a href="uploads.html" class="btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Back to Uploads</a>
                    </div>
                </div>
            </div>

            <!-- Analysis Result Container -->
            <div id="analysis-result-container">
                <!-- Populated by JS -->
            </div>

            <!-- Reconstructed Activity Trace (Hidden by default, shown via toggle) -->
            <div id="restored-timeline-container" class="restored-timeline-container" style="display: none;">
                <div class="section-header">
                    <h2><i class="fas fa-magic"></i> AI-Restored Activity Trace</h2>
                    <p class="section-subtitle">A "De-fragmented" view of the user's actions with AI-imputed data.</p>
                </div>
                <div id="restored-timeline" class="restored-timeline">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/analysis.js"></script>
</body>
</html>
